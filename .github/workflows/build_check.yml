name: CI Build Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install ARM GCC Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi make

    - name: Build Firmware (Make)
      run: |
        cd firmware/testspih743/Debug
        # Loại bỏ cờ -fcyclomatic-complexity vì gcc-arm-none-eabi trên Ubuntu không hỗ trợ
        find . -name "*.mk" -exec sed -i 's/-fcyclomatic-complexity//g' {} +
        make clean
        make -j$(nproc) all
