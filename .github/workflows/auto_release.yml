name: Auto Release Firmware

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Loại phiên bản (patch: sửa lỗi, minor: thêm tính năng nhỏ, major: thay đổi lớn)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_notes:
        description: 'Ghi chú thêm cho phiên bản này (nếu có)'
        required: false
        type: string

jobs:
  build-and-release:
    name: Build & Auto Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Quyền cần thiết để tạo Tag và Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Cần thiết để lấy toàn bộ lịch sử tag cũ

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make zip

      - name: Build Firmware
        run: |
          cd firmware/testspih743/Debug
          make clean
          make -j$(nproc) all
          # Sinh file .bin từ .elf để dễ nạp hơn nếu dùng CubeProgrammer
          arm-none-eabi-objcopy -O binary MyFC_H743.elf MyFC_H743.bin
          
      - name: Tự động Tăng Version & Tạo Tag (Auto Bump Version)
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump_type }}

      - name: Lấy thời gian hiện tại
        id: date
        run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: Create Firmware Archive
        run: |
          mkdir release_assets
          cp firmware/testspih743/Debug/MyFC_H743.elf release_assets/
          cp firmware/testspih743/Debug/MyFC_H743.bin release_assets/
          cd release_assets
          zip -r ../MyFC_H743_Firmware.zip .

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            ## 🚁 MyFC Firmware - Phiên bản ${{ steps.tag_version.outputs.new_tag }}
            📅 **Thời gian phát hành:** ${{ env.current_date }}
            
            ### 📝 Tác giả ghi chú
            ${{ github.event.inputs.custom_notes || 'Không có ghi chú thêm.' }}
            
            ---
            
            ### 🔄 Lịch sử thay đổi (Auto-generated Changelog)
            ${{ steps.tag_version.outputs.changelog }}
            
            ### 📦 Assets included:
            - `MyFC_H743.elf`: Firmware có kèm Debug Symbols (Dành cho STM32CubeIDE).
            - `MyFC_H743.bin`: Firmware dạng Binary để flash nhanh (qua STM32CubeProgrammer hoặc OpenOCD).
          draft: false
          prerelease: false
          files: |
            MyFC_H743_Firmware.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
